name: Deploy Backend (SSH)

on:
  push:
    branches: [main]
    paths: [backend/**]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          pip install --no-cache-dir -r requirements.txt

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT || 22 }}
          DEPLOY_PATH: ${{ secrets.SHOTCRAFT_DEPLOY_PATH }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT -o StrictHostKeyChecking=no" \
            --exclude '.env' \
            --exclude 'output/' \
            --exclude '__pycache__/' \
            --exclude '.adk/' \
            backend/ \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.SHOTCRAFT_DEPLOY_PATH }}"

            cd "$DEPLOY_PATH"

            # Install/update Python dependencies
            if [ -f "requirements.txt" ]; then
              pip install --no-cache-dir -r requirements.txt 2>/dev/null || \
              python3 -m pip install --no-cache-dir -r requirements.txt
            fi

            # Create output directory
            mkdir -p output

            # Restart systemd service
            SERVICE_NAME="${{ secrets.SHOTCRAFT_SERVICE_NAME }}"
            SERVICE_NAME="${SERVICE_NAME:-shotcraft-backend}"

            if sudo -n systemctl restart "$SERVICE_NAME" 2>/dev/null; then
              echo "Service $SERVICE_NAME restarted (sudoless)"
            elif [ -n "${{ secrets.DEPLOY_SUDO_PASSWORD }}" ]; then
              echo "${{ secrets.DEPLOY_SUDO_PASSWORD }}" | sudo -S systemctl restart "$SERVICE_NAME"
              echo "Service $SERVICE_NAME restarted (with sudo password)"
            else
              systemctl --user restart "$SERVICE_NAME" 2>/dev/null || \
                echo "Warning: Could not restart service $SERVICE_NAME"
            fi

            echo "Deploy complete: $(date)"
